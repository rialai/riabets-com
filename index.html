<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>riabets.com | Точки онлайн</title>
  <meta name="description" content="Онлайн-игра Точки: ходят владелец сайта и гости по очереди.">
  <style>
    :root {
      --bg: #f2efe9;
      --card: #fffcf7;
      --ink: #1e2724;
      --line: #cfd5cd;
      --owner: #111;
      --guest: #ff6a33;
      --accent: #234131;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(1300px 700px at 100% 0%, #e8f0e8 0%, transparent 55%), var(--bg);
      min-height: 100vh;
      padding: 18px;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid #d9dfd7;
      border-radius: 18px;
      box-shadow: 0 14px 45px rgba(20, 30, 24, 0.08);
      overflow: hidden;
    }

    header {
      padding: 18px 20px;
      border-bottom: 1px solid #e0e5de;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    h1 {
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      letter-spacing: 0.01em;
    }

    .status {
      font-size: 0.92rem;
      color: #516257;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 0;
    }

    .panel {
      border-right: 1px solid #e0e5de;
      padding: 16px;
    }

    .field {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      color: #54695d;
      margin-bottom: 5px;
      font-weight: 600;
    }

    input,
    select,
    button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #cfd6ce;
      font: inherit;
      padding: 10px 11px;
      background: #fff;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      cursor: pointer;
      font-weight: 700;
      background: #fff;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .hint {
      font-size: 0.82rem;
      color: #5f6e65;
      line-height: 1.45;
      margin-top: 10px;
    }

    .board-wrap {
      padding: 16px;
    }

    #board {
      width: 100%;
      max-width: 700px;
      aspect-ratio: 1 / 1;
      border: 1px solid #d5ddd3;
      border-radius: 10px;
      background: #fff;
      touch-action: manipulation;
      display: block;
      margin: 0 auto;
    }

    .legend {
      margin-top: 10px;
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      font-size: 0.88rem;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }

    .owner-dot { background: var(--owner); }
    .guest-dot { background: var(--guest); }

    #moves {
      margin-top: 12px;
      max-height: 190px;
      overflow: auto;
      border: 1px solid #d7ded6;
      border-radius: 10px;
      padding: 8px;
      font-size: 0.85rem;
      background: #fff;
    }

    .move {
      padding: 4px 2px;
      border-bottom: 1px dashed #e2e7e1;
      color: #4b5d52;
    }

    .move:last-child {
      border-bottom: 0;
    }

    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .panel {
        border-right: 0;
        border-bottom: 1px solid #e0e5de;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Точки онлайн</h1>
      <div id="status" class="status">Подключение не выполнено</div>
    </header>

    <div class="layout">
      <aside class="panel">
        <div class="field">
          <label for="room">Комната (общий код)</label>
          <input id="room" value="riabets-main-room" autocomplete="off">
        </div>

        <div class="field">
          <label for="role">Роль</label>
          <select id="role">
            <option value="owner">Я владелец (черные точки)</option>
            <option value="guest">Я гость (оранжевые точки)</option>
          </select>
        </div>

        <div class="field row">
          <button id="connect" class="primary">Подключиться</button>
          <button id="newRoom">Новая комната</button>
        </div>

        <div class="field row">
          <button id="notify">Разрешить уведомления</button>
          <button id="copyLink">Копировать ссылку</button>
        </div>

        <div class="field">
          <button id="sync">Обновить ходы</button>
        </div>

        <div class="hint">
          Правило хода: сначала ходит владелец, затем любой из гостей, потом снова владелец.
          <br><br>
          Важно: офлайн пуш в телефон возможен через подписку на тему в приложении ntfy. В браузере уведомление приходит, пока вкладка открыта.
        </div>

        <div id="moves"></div>
      </aside>

      <section class="board-wrap">
        <canvas id="board" width="700" height="700"></canvas>
        <div class="legend">
          <span><span class="dot owner-dot"></span>Владелец</span>
          <span><span class="dot guest-dot"></span>Гости</span>
          <span id="turnLabel">Ход: владелец</span>
        </div>
      </section>
    </div>
  </div>

  <script>
    const SIZE = 15;
    const MARGIN = 28;
    const CLICK_RADIUS = 16;
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");
    const turnLabel = document.getElementById("turnLabel");
    const movesEl = document.getElementById("moves");
    const roomEl = document.getElementById("room");
    const roleEl = document.getElementById("role");

    let topic = "";
    let eventSource = null;
    let moves = [];
    let pieces = new Map();
    let seen = new Set();
    let connected = false;

    const gridSizePx = () => canvas.width - MARGIN * 2;
    const stepPx = () => gridSizePx() / (SIZE - 1);
    const currentTurn = () => (moves.length % 2 === 0 ? "owner" : "guest");
    const roleLabel = (role) => (role === "owner" ? "владелец" : "гости");
    const keyOf = (x, y) => `${x}:${y}`;
    const inBounds = (x, y) => x >= 0 && x < SIZE && y >= 0 && y < SIZE;
    const oppositeRole = (role) => (role === "owner" ? "guest" : "owner");

    function keyToCoords(key) {
      const [xStr, yStr] = key.split(":");
      return { x: Number(xStr), y: Number(yStr) };
    }

    function getNeighbors(x, y) {
      return [
        { x: x - 1, y },
        { x: x + 1, y },
        { x, y: y - 1 },
        { x, y: y + 1 }
      ].filter((p) => inBounds(p.x, p.y));
    }

    function getGroup(startX, startY, role) {
      const startKey = keyOf(startX, startY);
      if (pieces.get(startKey) !== role) {
        return [];
      }
      const stack = [startKey];
      const visited = new Set([startKey]);

      while (stack.length) {
        const key = stack.pop();
        const { x, y } = keyToCoords(key);
        for (const n of getNeighbors(x, y)) {
          const nk = keyOf(n.x, n.y);
          if (!visited.has(nk) && pieces.get(nk) === role) {
            visited.add(nk);
            stack.push(nk);
          }
        }
      }
      return Array.from(visited);
    }

    function groupHasLiberty(groupKeys) {
      for (const key of groupKeys) {
        const { x, y } = keyToCoords(key);
        for (const n of getNeighbors(x, y)) {
          if (!pieces.has(keyOf(n.x, n.y))) {
            return true;
          }
        }
      }
      return false;
    }

    function captureAfterMove(x, y, role) {
      const opponent = oppositeRole(role);
      const checked = new Set();
      let captured = 0;

      for (const n of getNeighbors(x, y)) {
        const nk = keyOf(n.x, n.y);
        if (pieces.get(nk) !== opponent || checked.has(nk)) {
          continue;
        }
        const group = getGroup(n.x, n.y, opponent);
        for (const gk of group) {
          checked.add(gk);
        }
        if (!groupHasLiberty(group)) {
          for (const gk of group) {
            pieces.set(gk, role);
            captured += 1;
          }
        }
      }
      return captured;
    }

    function roomToTopic(room) {
      return `riabets-dots-${room.trim().toLowerCase().replace(/[^a-z0-9_-]/g, "-")}`;
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "#d5ddd3";
      ctx.lineWidth = 1;
      for (let i = 0; i < SIZE; i += 1) {
        const p = MARGIN + i * stepPx();
        ctx.beginPath();
        ctx.moveTo(MARGIN, p);
        ctx.lineTo(canvas.width - MARGIN, p);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(p, MARGIN);
        ctx.lineTo(p, canvas.height - MARGIN);
        ctx.stroke();
      }

      for (const [key, by] of pieces.entries()) {
        const { x, y } = keyToCoords(key);
        const cx = MARGIN + x * stepPx();
        const cy = MARGIN + y * stepPx();
        ctx.beginPath();
        ctx.fillStyle = by === "owner" ? "#111" : "#ff6a33";
        ctx.arc(cx, cy, 8.6, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function updateUi() {
      const turn = currentTurn();
      const myRole = roleEl.value;
      const canMove = connected && myRole === turn;
      turnLabel.textContent = `Ход: ${roleLabel(turn)}`;
      statusEl.textContent = connected
        ? `Подключено к комнате ${roomEl.value}. Сейчас ход: ${roleLabel(turn)}.`
        : "Подключение не выполнено";
      statusEl.style.color = canMove ? "#1b6b40" : "#516257";
      document.title = canMove ? "Ваш ход в Точки" : "Точки онлайн";

      movesEl.innerHTML = "";
      if (!moves.length) {
        const empty = document.createElement("div");
        empty.className = "move";
        empty.textContent = "Пока ходов нет.";
        movesEl.appendChild(empty);
      } else {
        moves.slice(-80).forEach((m, idx) => {
          const el = document.createElement("div");
          el.className = "move";
          const cap = m.captured ? `, захват: ${m.captured}` : "";
          el.textContent = `${moves.length - (moves.slice(-80).length - idx - 1)}. ${roleLabel(m.by)}: (${m.x + 1}, ${m.y + 1})${cap}`;
          movesEl.appendChild(el);
        });
      }
      drawBoard();
    }

    function notifyTurn() {
      if (Notification.permission === "granted") {
        new Notification("Точки: ваш ход", {
          body: "Гость сделал ход. Пора ответить.",
          tag: "dots-your-turn"
        });
      }
      const osc = new (window.AudioContext || window.webkitAudioContext)();
      const o = osc.createOscillator();
      const g = osc.createGain();
      o.type = "sine";
      o.frequency.value = 880;
      g.gain.value = 0.06;
      o.connect(g);
      g.connect(osc.destination);
      o.start();
      o.stop(osc.currentTime + 0.12);
    }

    function hasMoveAt(x, y) {
      return pieces.has(keyOf(x, y));
    }

    function applyMove(payload, externalId = null) {
      if (payload.type !== "move") {
        return false;
      }
      if (payload.ply !== moves.length) {
        return false;
      }
      if (payload.by !== currentTurn()) {
        return false;
      }
      if (hasMoveAt(payload.x, payload.y)) {
        return false;
      }
      pieces.set(keyOf(payload.x, payload.y), payload.by);
      const captured = captureAfterMove(payload.x, payload.y, payload.by);
      payload.captured = captured;
      moves.push(payload);
      if (externalId) {
        seen.add(externalId);
      }
      updateUi();
      return true;
    }

    async function sendMove(move) {
      const res = await fetch(`https://ntfy.sh/${topic}`, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain",
          "Priority": "default",
          "Title": "Dots move",
          "Tags": "game"
        },
        body: JSON.stringify(move)
      });
      if (!res.ok) {
        throw new Error("Не удалось отправить ход");
      }
    }

    async function syncMoves() {
      if (!topic) {
        return;
      }
      try {
        const res = await fetch(`https://ntfy.sh/${topic}/json?since=all`);
        if (!res.ok) {
          return;
        }
        const text = await res.text();
        const lines = text.split("\n").filter(Boolean);
        for (const line of lines) {
          let msg;
          try {
            msg = JSON.parse(line);
          } catch {
            continue;
          }
          if (msg.event !== "message" || !msg.message || seen.has(msg.id)) {
            continue;
          }
          let payload;
          try {
            payload = JSON.parse(msg.message);
          } catch {
            continue;
          }
          const before = currentTurn();
          if (applyMove(payload, msg.id) && roleEl.value === currentTurn() && roleEl.value !== before) {
            notifyTurn();
          }
        }
      } catch {
        statusEl.textContent = "Проблема синхронизации ходов";
      }
    }

    function connectSse() {
      if (eventSource) {
        eventSource.close();
      }
      eventSource = new EventSource(`https://ntfy.sh/${topic}/sse`);
      eventSource.onmessage = (evt) => {
        let msg;
        try {
          msg = JSON.parse(evt.data);
        } catch {
          return;
        }
        if (msg.event !== "message" || !msg.message || seen.has(msg.id)) {
          return;
        }
        let payload;
        try {
          payload = JSON.parse(msg.message);
        } catch {
          return;
        }
        const before = currentTurn();
        if (applyMove(payload, msg.id) && roleEl.value === currentTurn() && roleEl.value !== before) {
          notifyTurn();
        }
      };
      eventSource.onerror = () => {
        statusEl.textContent = "Связь прервалась, переподключаемся...";
      };
    }

    async function connect() {
      moves = [];
      pieces = new Map();
      seen = new Set();
      topic = roomToTopic(roomEl.value || "main");
      connected = true;
      updateUi();
      await syncMoves();
      connectSse();
      updateUi();
    }

    function pointerToCell(evt) {
      const rect = canvas.getBoundingClientRect();
      const x = (evt.clientX - rect.left) * (canvas.width / rect.width);
      const y = (evt.clientY - rect.top) * (canvas.height / rect.height);
      const gx = Math.round((x - MARGIN) / stepPx());
      const gy = Math.round((y - MARGIN) / stepPx());
      if (gx < 0 || gx >= SIZE || gy < 0 || gy >= SIZE) {
        return null;
      }
      const cx = MARGIN + gx * stepPx();
      const cy = MARGIN + gy * stepPx();
      const dist = Math.hypot(cx - x, cy - y);
      if (dist > CLICK_RADIUS) {
        return null;
      }
      return { x: gx, y: gy };
    }

    canvas.addEventListener("click", async (evt) => {
      if (!connected) {
        statusEl.textContent = "Сначала подключитесь к комнате";
        return;
      }
      const myRole = roleEl.value;
      if (myRole !== currentTurn()) {
        statusEl.textContent = `Сейчас ход: ${roleLabel(currentTurn())}`;
        return;
      }
      const cell = pointerToCell(evt);
      if (!cell || hasMoveAt(cell.x, cell.y)) {
        return;
      }
      const payload = {
        type: "move",
        x: cell.x,
        y: cell.y,
        by: myRole,
        ply: moves.length,
        ts: Date.now()
      };
      const applied = applyMove(payload);
      if (!applied) {
        return;
      }
      try {
        await sendMove(payload);
      } catch (err) {
        statusEl.textContent = err.message;
      }
    });

    document.getElementById("connect").addEventListener("click", connect);

    document.getElementById("newRoom").addEventListener("click", () => {
      roomEl.value = `room-${Math.random().toString(36).slice(2, 8)}`;
    });

    document.getElementById("sync").addEventListener("click", syncMoves);

    document.getElementById("notify").addEventListener("click", async () => {
      if (!("Notification" in window)) {
        statusEl.textContent = "Этот браузер не поддерживает уведомления";
        return;
      }
      const result = await Notification.requestPermission();
      statusEl.textContent = result === "granted"
        ? "Уведомления включены"
        : "Уведомления отключены";
    });

    document.getElementById("copyLink").addEventListener("click", async () => {
      const url = `${location.origin}${location.pathname}#room=${encodeURIComponent(roomEl.value)}`;
      await navigator.clipboard.writeText(url);
      statusEl.textContent = "Ссылка скопирована";
    });

    function restoreRoomFromHash() {
      const hash = location.hash.replace(/^#/, "");
      const params = new URLSearchParams(hash);
      const room = params.get("room");
      if (room) {
        roomEl.value = room;
      }
    }

    restoreRoomFromHash();
    drawBoard();
    updateUi();
  </script>
</body>
</html>
