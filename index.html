<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>riabets.com</title>
  <meta name="description" content="Временная страница riabets.com">
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      color: #111111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .lang-btn {
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, #111111 0%, #3a3a3a 100%);
      color: #ffffff;
      font: inherit;
      font-size: clamp(1.2rem, 3.2vw, 2rem);
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 18px 34px;
      cursor: pointer;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
      margin: 24px auto 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: min(86vw, 360px);
    }

    .lang-btn:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 22px 50px rgba(0, 0, 0, 0.23);
    }

    main {
      max-width: 760px;
      text-align: center;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      line-height: 1.25;
      font-weight: 700;
    }

    p {
      margin: 0;
      font-size: clamp(1rem, 2.3vw, 1.2rem);
      line-height: 1.5;
    }

    a {
      color: inherit;
    }
  </style>
</head>
<body>
  <main>
    <h1 id="headline"></h1>
    <button id="langBtn" class="lang-btn" type="button">EN</button>
    <p id="contactLine"></p>
  </main>

  <script>
    const STORAGE_KEY = "riabets-lang";
    const langBtn = document.getElementById("langBtn");
    const headline = document.getElementById("headline");
    const contactLine = document.getElementById("contactLine");

    const messages = {
      ru: {
        headline: "Когда-то тут будет что-то ебалозавалическое, а пока домен используется для почтового сервера.",
        contactHtml: "Кстати, моя почта: <a href=\"mailto:nikolai@riabets.com\">nikolai@riabets.com</a>",
        button: "Switch to English",
        htmlLang: "ru"
      },
      en: {
        headline: "One day there will be something mind-blowing here, but for now this domain is used for the mail server.",
        contactHtml: "By the way, my email is: <a href=\"mailto:nikolai@riabets.com\">nikolai@riabets.com</a>",
        button: "Переключить на русский",
        htmlLang: "en"
      }
    };

    function setLanguage(lang) {
      const data = messages[lang] || messages.ru;
      headline.textContent = data.headline;
      contactLine.innerHTML = data.contactHtml;
      langBtn.textContent = data.button;
      document.documentElement.lang = data.htmlLang;
      localStorage.setItem(STORAGE_KEY, lang);
    }

    function getInitialLanguage() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved === "ru" || saved === "en") {
        return saved;
      }
      return (navigator.language || "").toLowerCase().startsWith("ru") ? "ru" : "en";
    }

    let currentLang = getInitialLanguage();
    setLanguage(currentLang);

    langBtn.addEventListener("click", () => {
      currentLang = currentLang === "ru" ? "en" : "ru";
      setLanguage(currentLang);
    });
  </script>
</body>
</html>
